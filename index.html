<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B3-2nd-11504-2-1 教學版</title>
    <style>
        :root { --bg: #f2f4f7; --primary: #4a90e2; --success: #52c41a; --danger: #ff4d4f; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: bold; }
        .stat-correct { color: var(--success); }
        .stat-wrong { color: var(--danger); }
        .stat-remain { color: #666; }

        .word-text { font-size: 42px; font-weight: bold; margin: 15px 0; color: #1a1a1a; }
        .kk-text { color: #8c8c8c; font-size: 19px; margin-bottom: 25px; font-family: Arial; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        button { padding: 15px 10px; border-radius: 12px; border: 1.5px solid #eee; cursor: pointer; font-size: 16px; background: white; font-weight: bold; transition: 0.2s; }
        .btn-main { background: #e6f7ff; color: #1890ff; border-color: #91d5ff; }
        .btn-unsure { background: #fff1f0; color: #f5222d; border-color: #ffa39e; }
        .btn-option { height: 75px; line-height: 1.3; border: 2px solid #f0f0f0; }
        .feedback { font-size: 19px; padding: 18px; border-radius: 12px; margin-top: 15px; font-weight: bold; }
        
        /* 筆記卡片：縮小間距版本 */
        .review-card { text-align: left; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border: none; margin-bottom: 2px; }
        .review-card b { font-size: 26px; color: #1a1a1a; }
        .review-card small { font-size: 15px; color: #888; margin-left: 5px; }
        .review-card .cn-text { font-size: 18px; color: var(--danger); font-weight: bold; margin-top: 2px; display: block; }
        
        .hidden { display: none; }
        .speaker { background: none; border: none; font-size: 32px; color: var(--primary); cursor: pointer; }
        .nav-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; color: white; }
        .copy-btn { background: #333; color: white; padding: 8px 15px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; width: auto; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-page">
        <div style="font-size: 13px; color: #999; margin-bottom: 10px;">單元：B3-2nd-11504-2-1</div>
        <div class="stats-bar">
            <div class="stat-item stat-correct">✅ 正確: <span id="stat-c">0</span></div>
            <div class="stat-item stat-wrong">❌ 難詞: <span id="stat-w">0</span></div>
            <div class="stat-item stat-remain">⏳ 剩餘: <span id="stat-r">0</span></div>
        </div>
        <div id="content-area"></div>
        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <button onclick="exportCode()" style="font-size: 11px;">📋 複製進度</button>
            <button onclick="importCode()" style="font-size: 11px;">📥 匯入進度</button>
            <button onclick="resetAll(true)" style="font-size: 11px; color: #999;">❌ 清除重來</button>
        </div>
    </div>

    <div id="review-page" class="hidden">
        <h2 style="color: var(--danger); margin-bottom: 2px;">📖 難詞筆記</h2>
        <p id="review-count" style="font-weight: bold; color: #666; margin-bottom: 10px; font-size: 14px;"></p>
        
        <button id="btn-copy-note" onclick="copyNoteToClipboard()" class="copy-btn">📋 一鍵複製筆記內容</button>
        
        <div id="review-list" style="margin-bottom: 15px; border-top: 1px solid #eee;"></div>
        <div id="review-actions"></div>
    </div>
</div>

<script>
const vocabData = [
    {en: "concentration", pos: "(n.)", kk: "/ˌkɑːnsnˈtreɪʃn/", cn: "專注；集中；濃度"},
    {en: "dominate", pos: "(v.)", kk: "/ˈdɑːmɪneɪt/", cn: "支配；主導"},
    {en: "ethical", pos: "(adj.)", kk: "/ˈeθɪkl/", cn: "倫理的；道德的"},
    {en: "evaluate", pos: "(v.)", kk: "/ɪˈvæljueɪt/", cn: "評估；評價"},
    {en: "complex", pos: "(adj.)", kk: "/kəmˈpleks/", cn: "複雜的"},
    {en: "nervously", pos: "(adv.)", kk: "/ˈnɜːrvəsli/", cn: "緊張地"},
    {en: "gesture", pos: "(v./n.)", kk: "/ˈdʒestʃər/", cn: "做手勢；姿勢"},
    {en: "wage", pos: "(n.)", kk: "/weɪdʒ/", cn: "工資"},
    {en: "cast", pos: "(v.)", kk: "/kæst/", cn: "投；擲；拋"},
    {en: "aggressive", pos: "(adj.)", kk: "/əˈɡresɪv/", cn: "具侵略性的；積極進取的"}
];

const externalPosPool = {
    "(n.)": ["結構", "資源", "背景", "目標", "價值", "標準", "限制", "地位", "因素", "內容"],
    "(v.)": ["改善", "維持", "解決", "調整", "發展", "減少", "增加", "觀察", "證明", "反映"],
    "(adj.)": ["明顯的", "適當的", "傳統的", "合理的", "暫時的", "效率的", "獨特的", "負面的"],
    "(adv.)": ["顯然地", "適當地", "穩定地", "部分地", "強烈地", "相當地", "幾乎地"],
    "(v./n.)": ["挑戰", "回應", "計畫", "爭論", "支持", "研究", "保護", "傷害"]
};

let quizList = [];
let answers = {};
let mistakes = [];
let currentIdx = 0;
let correctCount = 0;

window.onload = function() {
    const savedAns = localStorage.getItem('vFinal_ans');
    const savedList = localStorage.getItem('vFinal_list');
    if (savedAns && savedList) {
        if (confirm("發現上次紀錄，是否繼續？")) {
            quizList = JSON.parse(savedList);
            answers = JSON.parse(savedAns);
            mistakes = JSON.parse(localStorage.getItem('vFinal_mistakes') || "[]");
            currentIdx = Object.keys(answers).length;
            correctCount = 0;
            Object.keys(answers).forEach((key) => {
                if (answers[key] === `${quizList[key].pos} ${quizList[key].cn}`) correctCount++;
            });
            render();
            return;
        }
    }
    resetAll(false);
};

function render() {
    document.getElementById('quiz-page').classList.remove('hidden');
    document.getElementById('review-page').classList.add('hidden');
    const area = document.getElementById('content-area');
    document.getElementById('stat-c').innerText = correctCount;
    document.getElementById('stat-w').innerText = mistakes.length;
    document.getElementById('stat-r').innerText = quizList.length - currentIdx;

    if (currentIdx >= quizList.length) {
        showReview();
        return;
    }

    const q = quizList[currentIdx];
    area.innerHTML = `
        <button onclick="speak('${q.en}')" class="speaker">🔊</button>
        <div class="word-text">${q.en}</div>
        <div class="kk-text">${q.kk}</div>
        <div id="action-zone">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button class="btn-main" onclick="showOptions()">🔍 我要作答</button>
                <button class="btn-unsure" onclick="handleUnsure()">❓ 我不確定</button>
            </div>
        </div>
    `;
}

function showOptions() {
    const q = quizList[currentIdx];
    const correctStr = `${q.pos} ${q.cn}`;
    const pool = externalPosPool[q.pos] || ["(n.) 內容"];
    const randomFakes = [...pool].sort(() => Math.random() - 0.5).slice(0, 3).map(f => `${q.pos} ${f}`);
    const finalOptions = [correctStr, ...randomFakes].sort(() => Math.random() - 0.5);

    document.getElementById('action-zone').innerHTML = `
        <div class="options-grid">
            ${finalOptions.map(o => `<button class="btn-option" onclick="handlePick('${o}')">${o}</button>`).join('')}
        </div>
    `;
}

function handlePick(val) {
    const q = quizList[currentIdx];
    const correctStr = `${q.pos} ${q.cn}`;
    answers[currentIdx] = val;
    const isCorrect = val === correctStr;
    if (isCorrect) correctCount++;
    else if (!mistakes.find(m => m.en === q.en)) mistakes.push(q);
    showResult(q, isCorrect);
}

function handleUnsure() {
    const q = quizList[currentIdx];
    answers[currentIdx] = "UNSURE";
    if (!mistakes.find(m => m.en === q.en)) mistakes.push(q);
    showResult(q, false, "已記在筆記");
}

function showResult(q, isCorrect, msg) {
    save();
    document.getElementById('action-zone').innerHTML = `
        <div class="feedback" style="background:${isCorrect?'#f6ffed':'#fff1f0'}; color:${isCorrect?'#389e0d':'#cf1322'}">
            ${msg || (isCorrect ? '答對了！' : '答錯囉')}<br>
            <small style="color:#555">正確解答：${q.pos} ${q.cn}</small>
        </div>
        <button onclick="currentIdx++; render();" style="width:100%; margin-top:15px; background:#333; color:white; padding:18px; border-radius:12px; font-weight:bold;">下一題</button>
    `;
}

function save() {
    localStorage.setItem('vFinal_list', JSON.stringify(quizList));
    localStorage.setItem('vFinal_ans', JSON.stringify(answers));
    localStorage.setItem('vFinal_mistakes', JSON.stringify(mistakes));
}

function showReview() {
    document.getElementById('quiz-page').classList.add('hidden');
    document.getElementById('review-page').classList.remove('hidden');
    const list = document.getElementById('review-list');
    document.getElementById('review-count').innerText = `共 ${mistakes.length} 個難詞`;
    
    if (mistakes.length === 0) {
        list.innerHTML = "<p>恭喜！全對。</p>";
        document.getElementById('btn-copy-note').classList.add('hidden');
        document.getElementById('review-actions').innerHTML = `<button onclick="resetAll(false)" class="nav-btn" style="background:var(--success)">全部重新練習</button>`;
    } else {
        document.getElementById('btn-copy-note').classList.remove('hidden');
        list.innerHTML = mistakes.map(m => `
            <div class="review-card">
                <div>
                    <b>${m.en}</b> <small>${m.kk}</small>
                    <span class="cn-text">${m.pos} ${m.cn}</span>
                </div>
                <button onclick="speak('${m.en}')" class="speaker" style="font-size: 28px;">🔊</button>
            </div>`).join('');
        document.getElementById('review-actions').innerHTML = `
            <button onclick="practiceMistakes()" class="nav-btn" style="background:var(--primary)">🔥 針對這 ${mistakes.length} 個字再練一次</button>
            <button onclick="resetAll(true)" class="nav-btn" style="background:#8c8c8c">全部重新練習</button>
        `;
    }
}

function copyNoteToClipboard() {
    if (mistakes.length === 0) return;
    const text = mistakes.map(m => `${m.en} ${m.kk} ${m.pos} ${m.cn}`).join('\n');
    navigator.clipboard.writeText(text).then(() => {
        alert("筆記內容已複製！");
    });
}

function practiceMistakes() {
    quizList = [...mistakes].sort(() => Math.random() - 0.5);
    answers = {}; mistakes = []; currentIdx = 0; correctCount = 0;
    save(); render();
}

function resetAll(confirmNeeded) {
    if (confirmNeeded && !confirm("確定要重新洗牌開始嗎？")) return;
    localStorage.clear();
    quizList = [...vocabData].sort(() => Math.random() - 0.5);
    answers = {}; mistakes = []; currentIdx = 0; correctCount = 0;
    save(); render();
}

function speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
function exportCode() { alert("進度碼已複製：" + btoa(unescape(encodeURIComponent(JSON.stringify({a:answers, l:quizList, m:mistakes}))))); }
function importCode() {
    const code = prompt("貼入代碼：");
    if (code) { try { const d = JSON.parse(decodeURIComponent(escape(atob(code)))); quizList=d.l; answers=d.a; mistakes=d.m; save(); location.reload(); } catch(e) { alert("代碼錯誤"); } }
}
</script>

</body>
</html>
