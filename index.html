<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2L5考卷單字複習</title>
    <style>
        :root { --bg: #f2f4f7; --primary: #4a90e2; --success: #52c41a; --danger: #ff4d4f; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 480px; margin: 0 auto; background: white; padding: 15px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1.5px solid #ddd; }
        
        #cover-page { padding: 20px 5px; }
        .main-title { font-size: 34px; font-weight: bold; color: #1a1a1a; margin-bottom: 8px; }
        .sub-title { font-size: 22px; color: #666; margin-bottom: 20px; font-weight: bold; }
        .honor-text { font-size: 18px; color: #d48806; background: #fff7e6; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #ffe58f; }

        .stats-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 12px; background: #f8f9fa; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: bold; }
        .word-text { font-size: 50px; font-weight: bold; margin: 15px 0; color: #1a1a1a; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn-option { height: 90px; font-size: 21px; font-weight: bold; background: white; border: 2.5px solid #eee; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 5px; }

        .btn-flex { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 120px; width: 100%; border-radius: 18px; cursor: pointer; border: 2.5px solid #eee; }
        .main-text { font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        .sub-text { font-size: 16px; opacity: 0.9; }
        .btn-main { background: #e6f7ff; color: #1890ff; border-color: #91d5ff; }
        .btn-unsure { background: #fff1f0; color: #f5222d; border-color: #ffa39e; }
        
        .feedback { font-size: 28px; padding: 25px 15px; border-radius: 15px; margin-top: 15px; font-weight: bold; line-height: 1.4; }
        .feedback small { font-size: 24px; color: #333; display: block; margin-top: 10px; font-weight: bold; }

        .bottom-btn-group { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .bottom-btn { padding: 15px 5px; font-size: 18px; font-weight: bold; border-radius: 10px; border: 1.5px solid #ddd; background: #fafafa; cursor: pointer; }

        .hidden { display: none !important; }
        .speaker { background: none; border: none; font-size: 55px; color: var(--primary); cursor: pointer; margin-bottom: 10px; }
        .nav-btn { width: 100%; padding: 20px; border: none; border-radius: 18px; font-size: 24px; font-weight: bold; margin-top: 12px; color: white; cursor: pointer; }
        
        .review-card { text-align: left; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .review-card b { font-size: 30px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 15px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        #log-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1000; }
        .log-content { width: 90%; max-width: 480px; height: 80%; background: white; margin: 30px auto; border-radius: 20px; padding: 20px; text-align: left; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="cover-page">
        <div class="main-title">B2L5考卷單字複習</div>
        <div class="sub-title">全 40 題</div>
        <div class="honor-text">🏆 目前已有 <span id="honor-count" style="font-size: 22px;">0</span> 位同學<br>達成「一次全部答對」目標！</div>
        <div id="start-options"></div>
        <button onclick="importCode()" class="nav-btn" style="background:#555; margin-top: 15px; font-size: 18px; height: 60px;">📥 匯入進度碼</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div class="stats-bar">
            <div style="color: var(--success);">✅ 正確: <span id="stat-c">0</span></div>
            <div style="color: var(--danger);">❌ 難詞: <span id="stat-w">0</span></div>
            <div style="color: #666;">⏳ 剩餘: <span id="stat-r">0</span></div>
        </div>
        <div id="content-area"></div>
        <div class="bottom-btn-group">
            <button class="bottom-btn" onclick="exportCode()">📋 複製</button>
            <button class="bottom-btn" onclick="importCode()">📥 匯入</button>
            <button class="bottom-btn" onclick="resetAllAction()" style="color: #888;">❌ 重來</button>
        </div>
    </div>

    <div id="review-page" class="hidden">
        <h2 style="color: var(--danger);">📖 難詞筆記</h2>
        <div id="review-list"></div>
        <button onclick="practiceMistakes()" class="nav-btn" style="background:var(--primary)">🔥 針對錯題再練一次</button>
        <button onclick="resetAllAction()" class="nav-btn" style="background:#8c8c8c">全部重新洗牌</button>
        <button onclick="showLogs()" style="margin-top:20px; color:#999; border:none; background:none; text-decoration:underline; font-size:15px; cursor:pointer;">📜 查看詳細學習進度軌跡</button>
    </div>

    <div id="done-page" class="hidden">
        <h1 style="font-size:80px;">🏆</h1>
        <h2 style="font-size:32px; margin-bottom: 30px;">恭喜！全數精熟！</h2>
        <button onclick="showLogs()" class="nav-btn" style="background:#444">查看老師審核報告</button>
        <button onclick="resetAllAction()" class="nav-btn" style="background:var(--primary)">下一輪挑戰</button>
    </div>
</div>

<div id="log-modal">
    <div class="log-content">
        <h3>📊 教師審核報告</h3>
        <div id="summary-table-area"></div>
        <button onclick="copyLogs()" style="background:#333; color:white; padding:10px; border-radius:8px;">複製日誌</button>
        <button onclick="document.getElementById('log-modal').style.display='none'" style="float:right;">✕</button>
        <div id="log-list" style="white-space: pre-wrap; font-family: monospace; font-size: 11px; margin-top:10px;"></div>
    </div>
</div>

<script>
const teachersHonorCount = 0; 

const vocabData = [
    {en: "Bead", pos: "(n.)", cn: "珠子"},
    {en: "Beam", pos: "(n.)", cn: "光線、橫樑"},
    {en: "Bean", pos: "(n.)", cn: "豆子"},
    {en: "Beard", pos: "(n.)", cn: "鬍鬚"},
    {en: "Beer", pos: "(n.)", cn: "啤酒"},
    {en: "Beetle", pos: "(n.)", cn: "甲蟲"},
    {en: "Beg", pos: "(v.)", cn: "乞求、請求"},
    {en: "Beginner", pos: "(n.)", cn: "初學者"},
    {en: "Behave", pos: "(v.)", cn: "表現、舉止"},
    {en: "Being", pos: "(n.)", cn: "生物、存在"},
    {en: "Belief", pos: "(n.)", cn: "信念、相信"},
    {en: "Below", pos: "(prep./adv.)", cn: "在...之下"},
    {en: "Bend", pos: "(v./n.)", cn: "彎曲"},
    {en: "Besides", pos: "(prep./adv.)", cn: "此外、除了...之外"},
    {en: "Bet", pos: "(v./n.)", cn: "打賭、肯定"},
    {en: "Beyond", pos: "(prep./adv.)", cn: "超越、在...那邊"},
    {en: "Bill", pos: "(n.)", cn: "帳單、鈔票"},
    {en: "Bind", pos: "(v.)", cn: "綑綁、聯繫"},
    {en: "Bitter", pos: "(adj.)", cn: "苦的、痛苦的"},
    {en: "Blackboard", pos: "(n.)", cn: "黑板"},
    {en: "Blank", pos: "(adj./n.)", cn: "空白的"},
    {en: "Blind", pos: "(adj.)", cn: "盲的"},
    {en: "Block", pos: "(n./v.)", cn: "街區、阻擋"},
    {en: "Bloom", pos: "(n./v.)", cn: "開花"},
    {en: "Board", pos: "(n./v.)", cn: "板、董事會、登（機/船）"},
    {en: "Boil", pos: "(v.)", cn: "沸騰、煮沸"},
    {en: "Bomb", pos: "(n./v.)", cn: "炸彈"},
    {en: "Concentration", pos: "(n.)", cn: "專注、集中"},
    {en: "Dominate", pos: "(v.)", cn: "支配、主導"},
    {en: "Evaluate", pos: "(v.)", cn: "評估、評價"},
    {en: "Complex", pos: "(adj.)", cn: "複雜的"},
    {en: "Nervously", pos: "(adv.)", cn: "緊張地"},
    {en: "Gesture", pos: "(n./v.)", cn: "手勢、姿勢"},
    {en: "Wage", pos: "(n.)", cn: "工資、薪水"},
    {en: "Cast", pos: "(v./n.)", cn: "投擲、卡司（演員陣容）"},
    {en: "Aggressive", pos: "(adj.)", cn: "具侵略性的、積極進取的"},
    {en: "Anxious", pos: "(adj.)", cn: "焦慮的"},
    {en: "Broadcast", pos: "(v./n.)", cn: "廣播、播送"},
    {en: "Clumsy", pos: "(adj.)", cn: "笨拙的"},
    {en: "Damage", pos: "(v./n.)", cn: "損害、傷害"}
];

const externalPosPool = {"(n.)":["結構","資源","背景","目標"], "(v.)":["改善","維持","解決","發展"], "(adj.)":["明顯","適當","傳統","合理"], "(adv.)":["顯然","穩定","相當","幾乎"], "(v./n.)":["挑戰","計畫","調整","保護"]};

let activityLogs = [], summaryStats = [], quizList = [], answers = {}, mistakes = [], currentIdx = 0, currentEntry = null;

window.onload = function() { document.getElementById('honor-count').innerText = teachersHonorCount; initCover(); };

function initCover() {
    const savedAns = localStorage.getItem('vTrack_ans');
    const startDiv = document.getElementById('start-options');
    if (savedAns && Object.keys(JSON.parse(savedAns)).length > 0) {
        const lastIdx = Object.keys(JSON.parse(savedAns)).length;
        startDiv.innerHTML = `<button onclick="confirmContinue(${lastIdx})" class="nav-btn" style="background:var(--success); height: 80px;">從上次進度開始</button><button onclick="confirmRestart(${lastIdx})" class="nav-btn" style="background:var(--danger); margin-top: 10px; font-size: 18px; height: 60px;">重新開始練習</button>`;
    } else { startDiv.innerHTML = `<button onclick="startGame()" class="nav-btn" style="background:var(--primary); height: 80px;">進入單字測驗</button>`; }
}

function confirmContinue(l) { if (confirm(`上次進度已完成 ${l} 題，確定要繼續嗎？`)) { loadData(); startGameSession(); } }
function confirmRestart(l) { if (confirm(`上次進度到第 ${l} 題，確定要重新開始嗎？`)) { localStorage.clear(); startGame(); } }
function startGame() { quizList = [...vocabData].sort(() => Math.random() - 0.5); answers = {}; mistakes = []; currentIdx = 0; addLog("--- 開始 ---"); startStatsEntry("正式測驗"); startGameSession(); }
function startGameSession() { document.getElementById('cover-page').classList.add('hidden'); render(); }
function loadData() { quizList = JSON.parse(localStorage.getItem('vTrack_list')); answers = JSON.parse(localStorage.getItem('vTrack_ans')); mistakes = JSON.parse(localStorage.getItem('vTrack_mistakes') || "[]"); activityLogs = JSON.parse(localStorage.getItem('vTrack_logs') || "[]"); summaryStats = JSON.parse(localStorage.getItem('vTrack_stats') || "[]"); currentIdx = Object.keys(answers).length; startStatsEntry("續作"); }

function render() {
    document.getElementById('quiz-page').classList.remove('hidden'); document.getElementById('review-page').classList.add('hidden');
    if (currentIdx >= quizList.length) { endStatsEntry(); showReview(); return; }
    document.getElementById('stat-c').innerText = Object.values(answers).filter(v => v !== 'UNSURE' && v.includes(' ')).length;
    document.getElementById('stat-w').innerText = mistakes.length;
    document.getElementById('stat-r').innerText = quizList.length - currentIdx;
    const q = quizList[currentIdx];
    document.getElementById('content-area').innerHTML = `<button onclick="speak('${q.en}')" class="speaker">🔊</button><div class="word-text">${q.en}</div><div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;"><div class="btn-flex btn-main" onclick="showOptions()"><span class="main-text">我要作答</span><span class="sub-text">請給答案選項</span></div><div class="btn-flex btn-unsure" onclick="handleUnsure()"><span class="main-text">我不確定</span><span class="sub-text">請放入單字卡</span></div></div>`;
}

function showOptions() {
    const q = quizList[currentIdx]; const correct = `${q.pos} ${q.cn}`;
    const pool = externalPosPool[q.pos] || ["(n.) 內容"];
    const randomFakes = [...pool].sort(() => Math.random() - 0.5).slice(0, 3).map(f => `${q.pos} ${f}`);
    const finalOptions = [correct, ...randomFakes].sort(() => Math.random() - 0.5);
    document.getElementById('content-area').innerHTML = `<button onclick="speak('${q.en}')" class="speaker">🔊</button><div class="word-text">${q.en}</div><div class="options-grid">${finalOptions.map(o => `<button class="btn-option" onclick="handlePick('${o}')">${o}</button>`).join('')}</div>`;
}

function handlePick(val) {
    const q = quizList[currentIdx], correct = `${q.pos} ${q.cn}`;
    answers[currentIdx] = val; const isCorrect = (val === correct);
    if (!isCorrect) { if(!mistakes.find(m => m.en === q.en)) mistakes.push(q); if(currentEntry) currentEntry.mistakes++; }
    showResult(q, isCorrect);
}

function handleUnsure() {
    const q = quizList[currentIdx]; answers[currentIdx] = "UNSURE";
    if(!mistakes.find(m => m.en === q.en)) mistakes.push(q);
    if(currentEntry) currentEntry.mistakes++;
    showResult(q, false, "已記在筆記");
}

function showResult(q, isCorrect, msg) {
    save();
    document.getElementById('content-area').innerHTML = `
        <div class="feedback" style="background:${isCorrect?'#f6ffed':'#fff1f0'}; color:${isCorrect?'#389e0d':'#cf1322'}">
            ${msg || (isCorrect ? '答對了！' : '答錯囉')}<br>
            <small>正確解答：${q.pos} ${q.cn}</small>
        </div>
        <button onclick="currentIdx++; render();" style="width:100%; margin-top:15px; background:#333; color:white; padding:20px; border-radius:15px; font-weight:bold; font-size:26px;">下一題</button>
    `;
}

function showReview() {
    document.getElementById('quiz-page').classList.add('hidden'); document.getElementById('review-page').classList.remove('hidden');
    if (mistakes.length === 0) { document.getElementById('review-page').classList.add('hidden'); document.getElementById('done-page').classList.remove('hidden'); }
    else { startStatsEntry("複習"); document.getElementById('review-list').innerHTML = mistakes.map(m => `<div class="review-card"><div><b>${m.en}</b><br><span style="color:red; font-weight:bold; font-size:24px;">${m.pos} ${m.cn}</span></div><button onclick="speak('${m.en}')" class="speaker" style="font-size: 32px;">🔊</button></div>`).join(''); }
}

function practiceMistakes() { endStatsEntry(); startStatsEntry("重練"); quizList = [...mistakes].sort(() => Math.random() - 0.5); answers = {}; mistakes = []; currentIdx = 0; save(); render(); }
function resetAllAction() { if(confirm("確定重來？")) { localStorage.clear(); location.reload(); } }
function save() { localStorage.setItem('vTrack_list', JSON.stringify(quizList)); localStorage.setItem('vTrack_ans', JSON.stringify(answers)); localStorage.setItem('vTrack_mistakes', JSON.stringify(mistakes)); localStorage.setItem('vTrack_logs', JSON.stringify(activityLogs)); localStorage.setItem('vTrack_stats', JSON.stringify(summaryStats)); }
function speak(t) { const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }
function exportCode() { alert("進度碼複製成功"); }
function importCode() { const c = prompt("代碼"); if(c) { try { const d = JSON.parse(decodeURIComponent(escape(atob(c)))); localStorage.setItem('vTrack_list', JSON.stringify(d.l)); localStorage.setItem('vTrack_ans', JSON.stringify(d.a)); localStorage.setItem('vTrack_mistakes', JSON.stringify(d.m)); location.reload(); } catch(e){} } }
function showLogs() {
    let h = `<table><tr><th>階段</th><th>錯題</th><th>秒數</th></tr>`;
    summaryStats.forEach(s => h += `<tr><td>${s.type}</td><td>${s.mistakes}</td><td>${Math.round((s.end-s.start)/1000)}</td></tr>`);
    document.getElementById('summary-table-area').innerHTML = h + `</table>`;
    document.getElementById('log-list').innerText = activityLogs.join('\n');
    document.getElementById('log-modal').style.display = 'block';
}
function copyLogs() { navigator.clipboard.writeText(document.getElementById('log-list').innerText); alert("成功"); }
function addLog(m) { const t = new Date(); activityLogs.push(`[${t.getHours()}:${t.getMinutes()}:${t.getSeconds()}] ${m}`); }
function startStatsEntry(t) { currentEntry = { type: t, start: new Date().getTime(), mistakes: 0 }; }
function endStatsEntry() { if(currentEntry) { currentEntry.end = new Date().getTime(); summaryStats.push(currentEntry); currentEntry = null; save(); } }
</script>
</body>
</html>
